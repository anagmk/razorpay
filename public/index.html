<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Razorpay Checkout</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            color: #172033;
        }

        main {
            width: min(92vw, 430px);
            padding: 28px;
            background: #ffffff;
            border: 1px solid #dde4ee;
            border-radius: 8px;
            box-shadow: 0 18px 55px rgba(23, 32, 51, 0.12);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 26px;
        }

        p {
            margin: 0 0 24px;
            color: #60708a;
            line-height: 1.5;
        }

        label {
            display: block;
            margin: 16px 0 6px;
            font-weight: 700;
            font-size: 14px;
        }

        input {
            width: 100%;
            min-height: 44px;
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 15px;
        }

        button {
            width: 100%;
            min-height: 46px;
            margin-top: 22px;
            border: 0;
            border-radius: 6px;
            background: #1f8a70;
            color: #ffffff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.65;
        }

        #status {
            min-height: 22px;
            margin-top: 16px;
            font-size: 14px;
            color: #47607f;
        }

        .success {
            color: #147a4d;
        }

        .error {
            color: #b42318;
        }
    </style>
</head>
<body>
    <main>
        <h1>Razorpay Payment</h1>
        <p>Enter customer details and pay securely through Razorpay Checkout.</p>

        <form id="payment-form">
            <label for="amount">Amount (INR)</label>
            <input id="amount" name="amount" type="number" min="1" step="1" value="500" required>

            <label for="name">Name</label>
            <input id="name" name="name" type="text" value="Demo Customer" required>

            <label for="email">Email</label>
            <input id="email" name="email" type="email" value="customer@example.com" required>

            <label for="contact">Contact</label>
            <input id="contact" name="contact" type="tel" value="9999999999" required>

            <button id="pay-button" type="button">Pay Now</button>
            <div id="status" role="status" aria-live="polite"></div>
        </form>
    </main>

    <script src="./script.js">
       
    </script>
</body>
</html>
